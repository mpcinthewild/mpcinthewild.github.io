  <link rel="stylesheet" href="{{ '/style.css' | relative_url }}" />
  <style>
      /* minimal nav fallback so the navbar is visible even if the main CSS isn't loaded */
      header .container { display: flex; align-items: center; justify-content: space-between; gap: 1rem; }

      /* site title styling when rendered in the header */
      .site-title { margin: 0; font-size: 1.6rem; line-height: 1; }
      .site-title a { color: inherit; text-decoration: none; }

      /* nav: keep as a flex row and vertically center its links */
      .site-nav {
        display: flex;
        gap: 1rem;
        padding: 0;
        align-items: center; /* vertical center */
        background: transparent; /* remove grey background */
        margin: 0;
      }

      /* link styles: no background, subtle underline on hover */
      .site-nav a {
        color: inherit;
        text-decoration: none;
        font-weight: 600;
        padding: 6px 0; /* small vertical padding so underline sits nicely */
        border-bottom: 2px solid transparent;
        transition: border-color 160ms ease-in-out, color 160ms ease-in-out;
      }

      .site-nav a:hover,
      .site-nav a:focus {
        border-bottom-color: currentColor;
        color: #2a2a2a;
        outline: none;
      }

      main { padding: 1rem; }
    </style>
  </head>
  <body>
    <header>
      <div class="container">
        <div>
          <h1 class="site-title"><a href="{{ '/' | relative_url }}">{{ site.title | default: "MPC in the Wild" }}</a></h1>
        </div>
        <nav class="site-nav">
          <a href="{{ '/' | relative_url }}">Home</a>
          <a href="{{ '/about/' | relative_url }}">About</a>
          <a href="{{ '/research/' | relative_url }}">Research</a>
		  <a href="{{ '/#workshop' | relative_url }}">Workshop</a>
		  <a href="{{ '/#internships' | relative_url }}">Internships</a>
          <a href="{{ '/#team' | relative_url }}">Team</a>
        </nav>
      </div>
    </header>

    <main class="container">
      {{ content }}
    </main>

    <footer>
      <div class="container">
        <p>&copy; {{ site.time | date: "%Y" }} {{ site.title | default: "MPC in the Wild" }}</p>
      </div>
    </footer>
  </body>
  
</html>
